<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Codex 凭据导出</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
    }

    body {
      box-sizing: border-box;
      width: 380px;
      margin: 0;
      padding: 16px;
      background: #f7f7f8;
      color: #202123;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 18px;
      line-height: 1.4;
    }

    p {
      margin: 8px 0;
      font-size: 13px;
      line-height: 1.5;
    }

    code {
      background: rgba(0, 0, 0, 0.06);
      padding: 1px 4px;
      border-radius: 4px;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }

    button {
      flex: 1;
      border: 0;
      border-radius: 8px;
      padding: 10px 12px;
      font-weight: 700;
      cursor: pointer;
    }

    #grabButton {
      background: #10a37f;
      color: #ffffff;
    }

    #grabButton:disabled {
      opacity: 0.6;
      cursor: progress;
    }

    #status {
      min-height: 20px;
      margin-top: 12px;
      padding: 10px;
      border-radius: 8px;
      background: #ffffff;
      border: 1px solid #dedee3;
      word-break: break-word;
      white-space: pre-wrap;
      font-size: 12px;
      line-height: 1.6;
    }


    details {
      margin-top: 12px;
      font-size: 12px;
    }

    details summary {
      cursor: pointer;
      user-select: none;
      color: #5f6368;
    }

    pre#previewContent {
      max-height: 220px;
      overflow: auto;
      margin: 8px 0 0;
      padding: 8px;
      background: #ffffff;
      border: 1px solid #dedee3;
      border-radius: 6px;
      font-family: Consolas, "Courier New", monospace;
      font-size: 11px;
      white-space: pre;
    }


    .hint { color: #5f6368; }
    .ok { color: #0f7b5f; }
    .error { color: #b42318; }

    [hidden] { display: none !important; }

    @media (prefers-color-scheme: dark) {
      body {
        background: #202123;
        color: #f7f7f8;
      }

      #status, pre#previewContent {
        background: #2f3037;
        color: #f7f7f8;
        border-color: #565869;
      }

      code {
        background: rgba(255, 255, 255, 0.1);
      }

      .hint, details summary { color: #c5c5d2; }
    }
  </style>
</head>
<body>
  <h1>Codex 凭据导出器</h1>

  <section id="mainSection">
    <p class="hint">读取浏览器当前 chatgpt.com 登录态,签出 OAuth access_token,组装成 Codex CLI 的 <code>auth.json</code>,复制到剪贴板。粘贴到 <code>~/.codex/auth.json</code> 即可。</p>

    <div class="actions">
      <button id="grabButton" type="button">抓取并复制 auth.json</button>
    </div>

    <div id="status" role="status" aria-live="polite">点击按钮开始。需要先在浏览器登录 chatgpt.com。</div>

    <details id="preview" hidden>
      <summary>预览 auth.json (含敏感信息)</summary>
      <pre id="previewContent"></pre>
    </details>
  </section>

  <script src="codex_credentials.js"></script>
  <script src="popup.js"></script>
</body>
</html>
